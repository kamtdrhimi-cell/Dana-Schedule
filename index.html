<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>දාන වේල් කළමනාකරණය (නා උයන ශ්‍රී පාද ආරණ්‍යය)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background-color: #f4f4f9; font-size: 14px; }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 3px; font-weight: bold; color: #444; }
        input, select { padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .submit-btn { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .submit-btn:hover { background-color: #218838; }
        
        /* Filter and Summary Section */
        .filter-section { background: #e9ecef; padding: 12px; border-radius: 6px; margin-top: 20px; }
        .summary-box { display: flex; justify-content: space-around; background: #007bff; color: white; padding: 10px; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        
        /* Table Styling */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Action Buttons */
        .action-btn { padding: 4px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; margin-right: 2px; }
        .edit-btn { background-color: #ffc107; color: black; }
        .delete-btn { background-color: #dc3545; color: white; }
        
        /* Badges */
        .badge { padding: 3px 6px; border-radius: 3px; font-size: 11px; font-weight: bold; text-align: center; display: inline-block; }
        .badge-yes { background-color: #d4edda; color: #155724; }
        .badge-no { background-color: #f8d7da; color: #721c24; }
        .badge-unknown { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <h2>දාන වේල් දිනපොත (නා උයන ශ්‍රී පාද ආරණ්‍යය)</h2>
    
    <!-- දත්ත ඇතුලත් කිරීමේ කොටස -->
    <div class="form-grid">
        <div class="form-group">
            <label>දිනය:</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label>නම:</label>
            <input type="text" id="name" placeholder="නම" list="nameList">
            <datalist id="nameList"></datalist>
        </div>
        <div class="form-group">
            <label>ලිපිනය:</label>
            <!-- list="addressList" මඟින් ලිපිනය සඳහා auto-suggest සක්‍රීය කරයි -->
            <input type="text" id="address" placeholder="ලිපිනය" list="addressList">
            <datalist id="addressList"></datalist>
        </div>
        <div class="form-group">
            <label>දුරකථනය:</label>
            <input type="tel" id="phone" placeholder="දුරකථනය" list="phoneList">
            <datalist id="phoneList"></datalist>
        </div>
        <div class="form-group">
            <label>පැමිණෙනවාද?:</label>
            <select id="attendance">
                <option value="ඔව්">ඔව්</option>
                <option value="නැත">නැත</option>
                <option value="තවම දන්නේ නැත">තවම දන්නේ නැත</option>
            </select>
        </div>
        <div class="form-group">
            <label>වියදම (රු.):</label>
            <input type="number" id="expense" placeholder="0.00" min="0">
        </div>
        <div class="form-group">
            <label>විශේෂ හේතුව:</label>
            <!-- list="reasonList" මඟින් විශේෂ හේතුව සඳහා auto-suggest සක්‍රීය කරයි -->
            <input type="text" id="reason" placeholder="විශේෂ හේතුව" list="reasonList">
            <datalist id="reasonList"></datalist>
        </div>
        <div class="form-group">
            <label>ඇතුලත් කළේ කවුද?:</label>
            <input type="text" id="enteredBy" placeholder="ඔබේ නම" list="enteredByList">
            <datalist id="enteredByList"></datalist>
        </div>
    </div>
    <button id="submitBtn" class="submit-btn">දත්ත සුරකින්න</button>

    <!-- පෙරහන් සහ සාරාංශය (Filters & Summary) -->
    <div class="filter-section">
        <div class="form-grid" style="margin-bottom: 0;">
            <div class="form-group">
                <label>වසර:</label>
                <select id="filterYear">
                    <option value="All">සියලුම වසරවල්</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <div class="form-group">
                <label>මාසය:</label>
                <select id="filterMonth">
                    <option value="All">සියලුම මාසයන්</option>
                    <option value="01">ජනවාරි</option>
                    <option value="02">පෙබරවාරි</option>
                    <option value="03">මාර්තු</option>
                    <option value="04">අප්‍රේල්</option>
                    <option value="05">මැයි</option>
                    <option value="06">ජූනි</option>
                    <option value="07">ජූලි</option>
                    <option value="08">අගෝස්තු</option>
                    <option value="09">සැප්තැම්බර්</option>
                    <option value="10">ඔක්තෝබර්</option>
                    <option value="11">නොවැම්බර්</option>
                    <option value="12">දෙසැම්බර්</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>නම මගින් සෙවීම:</label>
                <input type="text" id="searchName" placeholder="සෙවීමට නම ටයිප් කරන්න...">
            </div>
        </div>

        <!-- මාසික/වාර්ෂික සාරාංශය -->
        <div class="summary-box">
            <div id="totalMeals">මුළු වේල් ගණන: 0</div>
            <div id="totalExpenses">මුළු වියදම: රු. 0.00</div>
        </div>
    </div>

    <!-- ලැයිස්තුව (Simple Table Mode) -->
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>දිනය</th>
                    <th>නම</th>
                    <th>ලිපිනය</th>
                    <th>දුරකථනය</th>
                    <th>පැමිණීම</th>
                    <th>වියදම (රු.)</th>
                    <th>විශේෂ හේතුව</th>
                    <th>ඇතුලත් කළේ</th>
                    <th>ක්‍රියාකාරකම්</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="9" style="text-align:center;">දත්ත බාගත වෙමින් පවතී...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modern Firebase v9/v11 SDK Module Script Setup -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, 
        collection, 
        addDoc, 
        doc, 
        updateDoc, 
        deleteDoc, 
        onSnapshot, 
        query, 
        orderBy 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ✅ ඔයාගේ Firebase Config විස්තර
    const firebaseConfig = {
        apiKey: "AIzaSyB9-ZzRx0xAlUABVSTqE64V4C0GhKw0Rxw",
        authDomain: "nauyna-sripada-dana-schedule.firebaseapp.com",
        projectId: "nauyna-sripada-dana-schedule",
        storageBucket: "nauyna-sripada-dana-schedule.firebasestorage.app",
        messagingSenderId: "1082371823967",
        appId: "1:1082371823967:web:e2dd54fd7c64236d8ebeea"
    };

    // Firebase සක්‍රීය කිරීම
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allRecords = [];
    let editId = null;

    // සජීවීව (Live) දත්ත වෙනස්වීම් හඳුනාගැනීම
    const q = query(collection(db, "danawel"), orderBy("date"));
    onSnapshot(q, (snapshot) => {
        allRecords = [];
        snapshot.forEach((doc) => {
            allRecords.push({ id: doc.id, ...doc.data() });
        });
        updateAutoSuggestLists(); // Autocomplete ලැයිස්තු අලුත් කිරීම
        displayRecords();
    });

    // කලින් ඇතුලත් කල දත්ත අනුව Suggestion Lists සෑදීම
    function updateAutoSuggestLists() {
        const names = new Set();
        const addresses = new Set();
        const phones = new Set();
        const reasons = new Set();
        const users = new Set();

        allRecords.forEach(r => {
            if(r.name) names.add(r.name);
            if(r.address) addresses.add(r.address);
            if(r.phone) phones.add(r.phone);
            if(r.reason) reasons.add(r.reason);
            if(r.enteredBy) users.add(r.enteredBy);
        });

        buildDatalist("nameList", names);
        buildDatalist("addressList", addresses);
        buildDatalist("phoneList", phones);
        buildDatalist("reasonList", reasons);
        buildDatalist("enteredByList", users);
    }

    function buildDatalist(elementId, dataset) {
        const datalist = document.getElementById(elementId);
        datalist.innerHTML = "";
        dataset.forEach(value => {
            const option = document.createElement("option");
            option.value = value;
            datalist.appendChild(option);
        });
    }

    // දත්ත වගුවට එක් කිරීමේ ප්‍රධාන කොටස
    function displayRecords() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        const selectedYear = document.getElementById('filterYear').value;
        const selectedMonth = document.getElementById('filterMonth').value;
        const searchName = document.getElementById('searchName').value.toLowerCase();

        let totalMealsCount = 0;
        let totalCost = 0;

        // පෙරහන් කිරීම්
        const filtered = allRecords.filter(record => {
            if (!record.date || !record.name) return false;
            
            const resDate = new Date(record.date);
            const resYear = resDate.getFullYear().toString();
            const resMonth = (resDate.getMonth() + 1).toString().padStart(2, '0');
            
            const matchYear = (selectedYear === "All" || resYear === selectedYear);
            const matchMonth = (selectedMonth === "All" || resMonth === selectedMonth);
            const matchName = record.name.toLowerCase().includes(searchName);

            return matchYear && matchMonth && matchName;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:red;">ගැලපෙන දත්ත කිසිවක් නැත.</td></tr>`;
            document.getElementById('totalMeals').innerText = "මුළු වේල් ගණන: 0";
            document.getElementById('totalExpenses').innerText = "මුළු වියදම: රු. 0.00";
            return;
        }

        // වගුව සජීවීව යාවත්කාලීන කිරීම
        filtered.forEach((record) => {
            totalMealsCount++;
            const expenseValue = parseFloat(record.expense) || 0;
            totalCost += expenseValue;
            const specialReason = record.reason || "-";
            const whoEntered = record.enteredBy || "-";

            let attendanceBadge = `<span class="badge badge-unknown">${record.attendance}</span>`;
            if(record.attendance === "ඔව්") attendanceBadge = `<span class="badge badge-yes">ඔව්</span>`;
            if(record.attendance === "නැත") attendanceBadge = `<span class="badge badge-no">නැත</span>`;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${record.date}</strong></td>
                <td>${record.name}</td>
                <td>${record.address}</td>
                <td>${record.phone}</td>
                <td>${attendanceBadge}</td>
                <td>${expenseValue.toFixed(2)}</td>
                <td>${specialReason}</td>
                <td><i style="color:#555;">${whoEntered}</i></td>
                <td></td>
            `;

            const actionTd = tr.querySelector('td:last-child');
            
            const editBtn = document.createElement('button');
            editBtn.className = "action-btn edit-btn";
            editBtn.textContent = "Edit";
            editBtn.addEventListener('click', () => editRecord(record));
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = "action-btn delete-btn";
            deleteBtn.textContent = "Delete";
            deleteBtn.addEventListener('click', () => deleteRecord(record.id));

            actionTd.appendChild(editBtn);
            actionTd.appendChild(deleteBtn);
            tbody.appendChild(tr);
        });

        document.getElementById('totalMeals').innerText = `මුළු වේල් ගණන: ${totalMealsCount}`;
        document.getElementById('totalExpenses').innerText = `මුළු වියදම: රු. ${totalCost.toFixed(2)}`;
    }

    // අන්තර්ජාලයට දත්ත සුරැකීම (Insert / Update)
    async function saveRecord() {
        const date = document.getElementById('date').value;
        const name = document.getElementById('name').value;
        const address = document.getElementById('address').value;
        const phone = document.getElementById('phone').value;
        const attendance = document.getElementById('attendance').value;
        const expense = document.getElementById('expense').value || 0;
        const reason = document.getElementById('reason').value || "";
        const enteredBy = document.getElementById('enteredBy').value || "";

        if (!date || !name || !address || !phone || !enteredBy) {
            alert("කරුණාකර ප්‍රධාන විස්තර (දිනය, නම, ලිපිනය, දුරකථනය, ඇතුලත් කළේ කවුද) ඇතුලත් කරන්න!");
            return;
        }

        const recordData = { date, name, address, phone, attendance, expense: parseFloat(expense), reason, enteredBy };

        try {
            if (editId) {
                await updateDoc(doc(db, "danawel", editId), recordData);
                editId = null;
                document.getElementById('submitBtn').innerText = "දත්ත සුරකින්න";
            } else {
                await addDoc(collection(db, "danawel"), recordData);
            }
            clearForm();
        } catch (error) {
            console.error("Error saving data: ", error);
            alert("දත්ත සුරැකීමේදී ගැටළුවක් ඇතිවිය!");
        }
    }

    // දත්ත වෙනස් කිරීමට තෝරා ගැනීම
    function editRecord(record) {
        document.getElementById('date').value = record.date;
        document.getElementById('name').value = record.name;
        document.getElementById('address').value = record.address;
        document.getElementById('phone').value = record.phone;
        document.getElementById('attendance').value = record.attendance;
        document.getElementById('expense').value = record.expense;
        document.getElementById('reason').value = record.reason || "";
        document.getElementById('enteredBy').value = record.enteredBy || "";
        
        editId = record.id;
        document.getElementById('submitBtn').innerText = "යාවත්කාලීන කරන්න (Update)";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // අන්තර්ජාලයෙන් දත්ත මකා දැමීම
    async function deleteRecord(id) {
        if (confirm("මෙම විස්තරය මකා දැමීමට අවශ්‍යද?")) {
            try {
                await deleteDoc(doc(db, "danawel", id));
            } catch (error) {
                console.error("Error deleting document: ", error);
            }
        }
    }

    function clearForm() {
        document.getElementById('date').value = "";
        document.getElementById('name').value = "";
        document.getElementById('address').value = "";
        document.getElementById('phone').value = "";
        document.getElementById('attendance').value = "ඔව්";
        document.getElementById('expense').value = "";
        document.getElementById('reason').value = "";
    }

    // Event Listeners සම්බන්ධ කිරීම
    document.getElementById('submitBtn').addEventListener('click', saveRecord);
    document.getElementById('filterYear').addEventListener('change', displayRecords);
    document.getElementById('filterMonth').addEventListener('change', displayRecords);
    document.getElementById('searchName').addEventListener('input', displayRecords);
</script>

</body>
</html>
